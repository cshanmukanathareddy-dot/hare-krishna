<h2>IoT Architecture</h2>

<p>
IoT consists of multiple layers that work together to collect, transmit, and process data.
</p>

<h3>Layers:</h3>
<ul>
<li>Perception Layer (Sensors)</li>
<li>Network Layer (Connectivity)</li>
<li>Application Layer (User Interface)</li>
</ul>

<p>
IoT is used in smart homes, agriculture, healthcare, and industries.
</p>
