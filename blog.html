<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NovaTech Hub Blogs</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #eef2f7;
}

header {
    background: linear-gradient(135deg, #0f172a, #1e40af);
    color: white;
    text-align: center;
    padding: 20px;
}

.hero {
    text-align: center;
    padding: 40px;
}

.search-box {
    width: 50%;
    margin: 20px auto;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #ccc;
    display: block;
}

.cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 25px;
    padding: 30px;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 15px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

.preview {
    font-size: 14px;
    color: #555;
    margin-top: 10px;
}

.button {
    margin-top: 15px;
    display: inline-block;
    padding: 10px 16px;
    background: #2563eb;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}

#blogView {
    display: none;
    max-width: 800px;
    margin: 40px auto;
    padding: 25px;
    background: white;
    border-radius: 15px;
}

.back {
    margin-bottom: 10px;
    padding: 8px 12px;
    background: #2563eb;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}
</style>
</head>

<body>

<header>
    <h2>🚀 NovaTech Hub</h2>
</header>

<section class="hero">
    <h1>Latest Blogs</h1>
</section>

<input type="text" class="search-box" id="search" placeholder="Search blogs..." onkeyup="searchBlogs()">

<div class="cards" id="blogList"></div>

<div id="blogView">
    <button class="back" onclick="goBack()">⬅ Back</button>
    <h2 id="title"></h2>
    <div id="content"></div>
</div>

<script>

/* BLOG DATA (FULL CONTENT HERE) */
const blogs = [
{
title:"Edge AI Basics",
content:`<p>Edge AI is a revolutionary approach where artificial intelligence runs directly on devices instead of cloud servers.</p>
<p>This reduces latency and enables real-time processing, making it ideal for applications like smart cameras, autonomous vehicles, and healthcare monitoring.</p>
<p>Unlike traditional AI systems, Edge AI improves privacy because data is processed locally.</p>
<p>Technologies like TensorFlow Lite and NVIDIA Jetson are widely used in Edge AI.</p>
<p>This technology is growing rapidly and is considered the future of intelligent systems.</p>`
},

{
title:"Machine Learning Guide",
content:`<p>Machine Learning allows systems to learn from data and improve automatically.</p>
<p>There are three main types: supervised, unsupervised, and reinforcement learning.</p>
<p>ML is used in recommendation systems, fraud detection, and AI chatbots.</p>
<p>Popular tools include Python, TensorFlow, and Scikit-learn.</p>
<p>Machine learning is one of the most important technologies today.</p>`
},

{
title:"Cloud Computing",
content:`<p>Cloud computing provides computing services over the internet instead of local systems.</p>
<p>It includes services like storage, servers, and databases.</p>
<p>Popular cloud providers include AWS, Azure, and Google Cloud.</p>
<p>Cloud computing is scalable, cost-effective, and flexible.</p>
<p>It plays a key role in modern digital applications.</p>`
}

];

/* SHOW PREVIEW ONLY */
function getPreview(html){
    let text = html.replace(/<[^>]+>/g, ""); // remove HTML tags
    return text.substring(0,120) + "...";
}

/* DISPLAY BLOGS */
function displayBlogs(data){
    let container = document.getElementById("blogList");
    container.innerHTML = "";

    data.forEach((blog,i)=>{
        container.innerHTML += `
        <div class="card">
            <h3>${blog.title}</h3>
            <p class="preview">${getPreview(blog.content)}</p>
            <div class="button" onclick="openBlog(${i})">Read More</div>
        </div>`;
    });
}

/* SEARCH */
function searchBlogs(){
    let val = document.getElementById("search").value.toLowerCase();
    let filtered = blogs.filter(b => b.title.toLowerCase().includes(val));
    displayBlogs(filtered);
}

/* OPEN FULL BLOG */
function openBlog(i){
    document.getElementById("blogList").style.display="none";
    document.getElementById("blogView").style.display="block";

    document.getElementById("title").innerText = blogs[i].title;
    document.getElementById("content").innerHTML = blogs[i].content;
}

/* BACK */
function goBack(){
    document.getElementById("blogView").style.display="none";
    document.getElementById("blogList").style.display="grid";
}

/* INIT */
displayBlogs(blogs);

</script>

</body>
</html>
