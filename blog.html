content: `
<h3>Introduction</h3>
<p>Edge AI is a revolutionary technology that enables artificial intelligence models to run directly on local devices such as smartphones, IoT devices, cameras, and embedded systems. Unlike traditional AI systems that rely heavily on cloud computing, Edge AI processes data locally, making systems faster, more secure, and efficient.</p>

<h3>How Edge AI Works</h3>
<p>Edge AI works by deploying trained machine learning models directly onto hardware devices. These devices collect data through sensors and process it instantly without sending it to a remote server. This reduces latency and ensures real-time decision-making.</p>

<h3>Advantages of Edge AI</h3>
<p>One major advantage is low latency. Since data is processed locally, there is no delay caused by sending data to the cloud. This is crucial in applications like self-driving cars and industrial automation.</p>

<p>Another advantage is privacy. Sensitive data remains on the device, reducing the risk of data breaches. This is particularly important in healthcare and finance.</p>

<p>Edge AI also reduces bandwidth usage since less data is transmitted over the internet.</p>

<h3>Applications</h3>
<p>Edge AI is widely used in smart homes, surveillance systems, healthcare devices, and autonomous vehicles. For example, security cameras can detect unusual activity without cloud processing.</p>

<h3>Challenges</h3>
<p>Despite its advantages, Edge AI faces challenges such as limited processing power and energy constraints. Developers must optimize models to run efficiently on small devices.</p>

<h3>Future Scope</h3>
<p>The future of Edge AI is promising with advancements in AI chips and hardware acceleration. It will play a key role in smart cities, robotics, and IoT ecosystems.</p>

<p>In conclusion, Edge AI is transforming how AI systems operate by bringing intelligence closer to the data source, enabling faster and more secure processing.</p>
`

<p>IoT architecture consists of multiple layers:</p>

<h3>3. Processing Layer</h3>

<h3>4. Application Layer</h3>

<h3>Benefits</h3>

function displayBlogs(data){
    let container = document.getElementById("blogList");
    container.innerHTML = "";

    data.forEach((blog,i)=>{
        container.innerHTML += `
        <div class="card">
            <h3>${blog.title}</h3>
            <p>${blog.content}</p>
            <a class="button" onclick="openBlog(${i})">Read More</a>
        </div>`;
    });
}

function searchBlogs(){
    let val = document.getElementById("search").value.toLowerCase();
    let filtered = blogs.filter(b => b.title.toLowerCase().includes(val));
    displayBlogs(filtered);
}

function openBlog(i){
    document.getElementById("blogList").style.display="none";
    document.getElementById("blogView").style.display="block";

    document.getElementById("title").innerText = blogs[i].title;
    document.getElementById("content").innerText = blogs[i].content;
}

function goBack(){
    document.getElementById("blogView").style.display="none";
    document.getElementById("blogList").style.display="grid";
}

displayBlogs(blogs);
