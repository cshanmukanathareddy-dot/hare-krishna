content: `
<h3>Introduction</h3>
<p>Edge AI is a revolutionary technology that enables artificial intelligence models to run directly on local devices such as smartphones, IoT devices, cameras, and embedded systems. Unlike traditional AI systems that rely heavily on cloud computing, Edge AI processes data locally, making systems faster, more secure, and efficient.</p>

<h3>How Edge AI Works</h3>
<p>Edge AI works by deploying trained machine learning models directly onto hardware devices. These devices collect data through sensors and process it instantly without sending it to a remote server. This reduces latency and ensures real-time decision-making.</p>

<h3>Advantages of Edge AI</h3>
<p>One major advantage is low latency. Since data is processed locally, there is no delay caused by sending data to the cloud. This is crucial in applications like self-driving cars and industrial automation.</p>

<p>Another advantage is privacy. Sensitive data remains on the device, reducing the risk of data breaches. This is particularly important in healthcare and finance.</p>

<p>Edge AI also reduces bandwidth usage since less data is transmitted over the internet.</p>

<h3>Applications</h3>
<p>Edge AI is widely used in smart homes, surveillance systems, healthcare devices, and autonomous vehicles. For example, security cameras can detect unusual activity without cloud processing.</p>

<h3>Challenges</h3>
<p>Despite its advantages, Edge AI faces challenges such as limited processing power and energy constraints. Developers must optimize models to run efficiently on small devices.</p>

<h3>Future Scope</h3>
<p>The future of Edge AI is promising with advancements in AI chips and hardware acceleration. It will play a key role in smart cities, robotics, and IoT ecosystems.</p>

<p>In conclusion, Edge AI is transforming how AI systems operate by bringing intelligence closer to the data source, enabling faster and more secure processing.</p>
`

<h3>Introduction</h3>
<p>Machine Learning (ML) is a powerful branch of artificial intelligence that enables systems to learn from data and improve their performance without being explicitly programmed. Instead of writing fixed rules, developers train models using data so they can identify patterns, make decisions, and predict outcomes. ML is now a core technology behind many modern applications such as recommendation systems, voice assistants, fraud detection, and self-driving cars.</p>

<p>The rise of big data and computing power has accelerated the adoption of machine learning across industries. Organizations today rely on ML to automate processes, gain insights, and improve efficiency. Whether it is analyzing customer behavior or detecting anomalies, ML provides intelligent solutions that adapt over time.</p>

<h3>Types of Machine Learning</h3>
<p>Machine learning is broadly divided into three main categories:</p>

<p><strong>1. Supervised Learning:</strong> In this approach, models are trained using labeled data. This means the input data comes with correct outputs. The model learns to map inputs to outputs and can later predict results for new data. Examples include spam detection and image classification.</p>

<p><strong>2. Unsupervised Learning:</strong> Here, models work with unlabeled data and try to find hidden patterns or structures. Clustering and association are common techniques. It is widely used in customer segmentation and recommendation systems.</p>

<p><strong>3. Reinforcement Learning:</strong> This type involves learning through interaction. An agent takes actions in an environment and receives rewards or penalties. Over time, it learns to maximize rewards. It is used in robotics, gaming, and autonomous systems.</p>

<h3>How Machine Learning Works</h3>
<p>The ML process typically begins with data collection. Data is then cleaned and preprocessed to remove noise and inconsistencies. After that, a suitable algorithm is selected based on the problem type.</p>

<p>The model is trained using historical data and evaluated using test data. Performance metrics such as accuracy, precision, and recall help determine how well the model performs. Finally, the model is deployed into real-world applications where it continues to learn and improve.</p>

<h3>Popular Algorithms</h3>
<p>Some commonly used machine learning algorithms include linear regression, logistic regression, decision trees, random forests, support vector machines, and neural networks. Deep learning, a subset of ML, uses multi-layered neural networks to handle complex tasks like image recognition and natural language processing.</p>

<h3>Applications of Machine Learning</h3>
<p>Machine learning has a wide range of applications across industries:</p>

<p>In healthcare, ML helps in disease prediction, medical imaging analysis, and personalized treatment plans. In finance, it is used for fraud detection, risk assessment, and algorithmic trading. In e-commerce, recommendation systems suggest products based on user behavior.</p>

<p>Other applications include speech recognition, natural language processing, chatbots, self-driving cars, and predictive maintenance in industries.</p>

<h3>Benefits of Machine Learning</h3>
<p>Machine learning offers several advantages:</p>

<p>It automates repetitive tasks, reducing human effort. It improves accuracy by learning from data patterns. It provides predictive insights that help businesses make informed decisions. Additionally, ML systems can adapt to new data, making them more flexible than traditional software.</p>

<h3>Challenges in Machine Learning</h3>
<p>Despite its benefits, ML comes with challenges. High-quality data is essential, and collecting such data can be difficult. Models may also suffer from bias if the training data is not balanced. Overfitting is another issue where a model performs well on training data but poorly on new data.</p>

<p>Moreover, ML models can be computationally expensive and require significant resources. Interpretability is also a concern, especially in deep learning models where decisions are not always transparent.</p>

<h3>Future of Machine Learning</h3>
<p>The future of machine learning is promising. With advancements in deep learning, edge AI, and quantum computing, ML systems will become more powerful and efficient. Integration with IoT and 5G will further expand its applications.</p>

<p>Automated machine learning (AutoML) is also emerging, making it easier for non-experts to build ML models. Ethical AI and explainable AI are gaining importance to ensure fairness and transparency.</p>

<h3>Conclusion</h3>
<p>Machine learning is transforming industries by enabling intelligent systems that learn and adapt. From improving healthcare outcomes to enhancing customer experiences, ML is shaping the future of technology. As tools and techniques continue to evolve, machine learning will become even more integral to solving complex real-world problems.</p>

<h3>Introduction</h3>
<p>5G technology represents the fifth generation of wireless communication, designed to deliver faster speeds, lower latency, and greater connectivity compared to previous generations. It is a key enabler for modern technologies such as IoT, smart cities, autonomous vehicles, and augmented reality.</p>

<p>Unlike 4G, which primarily focused on mobile internet, 5G is built to support a wide range of devices and applications, from smartphones to industrial machines. It aims to create a fully connected world where everything communicates seamlessly.</p>

<h3>Key Features of 5G</h3>
<p>5G offers several advanced features that set it apart:</p>

<p><strong>High Speed:</strong> 5G can deliver speeds up to 10 Gbps, making it significantly faster than 4G.</p>

<p><strong>Low Latency:</strong> Latency is reduced to as low as 1 millisecond, enabling real-time communication.</p>

<p><strong>Massive Connectivity:</strong> It can support millions of devices per square kilometer, essential for IoT ecosystems.</p>

<p><strong>Energy Efficiency:</strong> 5G networks are designed to consume less power, improving sustainability.</p>

<h3>How 5G Works</h3>
<p>5G uses advanced technologies such as millimeter waves, small cells, and beamforming. Millimeter waves allow high-speed data transmission, while small cells ensure better coverage in densely populated areas.</p>

<p>Beamforming directs signals towards specific devices instead of broadcasting in all directions, improving efficiency and reducing interference.</p>

<h3>Applications of 5G</h3>
<p>5G technology enables a wide range of applications:</p>

<p>In smart cities, it supports traffic management, energy systems, and public safety. In healthcare, 5G enables remote surgeries and real-time monitoring through connected devices.</p>

<p>Autonomous vehicles rely on 5G for instant communication with other vehicles and infrastructure. In entertainment, it enhances gaming and streaming experiences with ultra-low latency.</p>

<p>Industries use 5G for automation, predictive maintenance, and real-time analytics.</p>

<h3>Benefits of 5G</h3>
<p>5G improves user experience with faster downloads and smoother streaming. It enables new technologies such as virtual reality and augmented reality.</p>

<p>Businesses benefit from increased efficiency, reduced costs, and new opportunities for innovation. It also supports the growth of IoT and smart devices.</p>

<h3>Challenges of 5G</h3>
<p>Despite its advantages, 5G faces challenges. Infrastructure deployment is expensive and requires significant investment. High-frequency signals have limited range and may require more towers.</p>

<p>Security is another concern, as increased connectivity creates more potential attack points. Additionally, there are concerns about compatibility with existing systems.</p>

<h3>Future of 5G</h3>
<p>The future of 5G is bright, with ongoing research and development aimed at improving performance and coverage. It will play a crucial role in enabling technologies like AI, IoT, and edge computing.</p>

<p>As adoption increases, 5G will drive innovation across industries, creating smarter and more connected environments.</p>

<h3>Conclusion</h3>
<p>5G technology is a game-changer in wireless communication, offering unprecedented speed, connectivity, and efficiency. It is set to revolutionize industries and transform how we live and work in the digital age.</p>

function displayBlogs(data){
    let container = document.getElementById("blogList");
    container.innerHTML = "";

    data.forEach((blog,i)=>{
        container.innerHTML += `
        <div class="card">
            <h3>${blog.title}</h3>
            <p>${blog.content}</p>
            <a class="button" onclick="openBlog(${i})">Read More</a>
        </div>`;
    });
}

function searchBlogs(){
    let val = document.getElementById("search").value.toLowerCase();
    let filtered = blogs.filter(b => b.title.toLowerCase().includes(val));
    displayBlogs(filtered);
}

function openBlog(i){
    document.getElementById("blogList").style.display="none";
    document.getElementById("blogView").style.display="block";

    document.getElementById("title").innerText = blogs[i].title;
    document.getElementById("content").innerText = blogs[i].content;
}

function goBack(){
    document.getElementById("blogView").style.display="none";
    document.getElementById("blogList").style.display="grid";
}

displayBlogs(blogs);
