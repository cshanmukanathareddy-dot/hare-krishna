<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NovaTech Hub Blogs</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
    margin: 0;
    background: #eef2f7;
    color: #1e293b;
}

/* HEADER */
header {
    background: linear-gradient(135deg, #0f172a, #1e40af);
    color: white;
    text-align: center;
    padding: 40px 20px;
}

header h1 {
    margin: 0;
    font-size: 32px;
}

/* SEARCH */
.search-box {
    width: 60%;
    margin: 30px auto;
    display: block;
    padding: 14px;
    border-radius: 12px;
    border: 1px solid #cbd5e1;
    font-size: 16px;
}

/* GRID */
.cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 30px;
    padding: 40px;
}

/* CARD */
.card {
    background: #ffffff;
    border-radius: 20px;
    padding: 25px;
    text-align: left;
    box-shadow: 0 15px 35px rgba(0,0,0,0.08);
    transition: all 0.3s ease;
    cursor: pointer;
}

.card:hover {
    transform: translateY(-8px);
    background: #e0e7ff;
}

/* 🔵 BLUE HEADING STYLE */
.card h3 {
    display: inline-block;
    background: #2563eb;
    color: white;
    padding: 6px 14px;
    border-radius: 999px;
    font-size: 14px;
    margin-bottom: 12px;
}

.card p {
    font-size: 14px;
    color: #475569;
}

/* BLOG VIEW */
#blogView {
    display: none;
    max-width: 800px;
    margin: 40px auto;
    padding: 30px;
    background: white;
    border-radius: 20px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.1);
}

#blogView h2 {
    margin-bottom: 15px;
}

.back-btn {
    margin-bottom: 20px;
    padding: 10px 15px;
    border: none;
    background: #2563eb;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}

.back-btn:hover {
    background: #1d4ed8;
}

/* FOOTER */
footer {
    background: #0f172a;
    color: #cbd5f5;
    text-align: center;
    padding: 20px;
    margin-top: 40px;
}

/* MOBILE */
@media(max-width:768px){
    .search-box {
        width: 90%;
    }
}
</style>
</head>

<body>

<header>
    <h1>🚀 NovaTech Hub Blogs</h1>
</header>

<input type="text" class="search-box" id="search" placeholder="Search blogs..." onkeyup="searchBlogs()">

<div class="cards" id="blogList"></div>

<div id="blogView">
    <button class="back-btn" onclick="goBack()">⬅ Back</button>
    <h2 id="blogTitle"></h2>
    <p id="blogContent"></p>
</div>

<footer>
    <p>© 2026 NovaTech Hub</p>
</footer>

<script>

const blogs = [
{title:"Edge AI Basics", content:"Edge AI allows data processing directly on devices like smartphones and IoT systems. It reduces latency and improves privacy."},
{title:"IoT Architecture", content:"IoT architecture consists of sensors, networks, and cloud systems enabling connected devices."},
{title:"Machine Learning Guide", content:"Machine learning allows systems to learn from data using algorithms like regression and classification."},
{title:"Deep Learning", content:"Deep learning uses neural networks to process complex data such as images and speech."},
{title:"5G Technology", content:"5G provides ultra-fast speeds, low latency, and supports smart cities."},
{title:"Cyber Security Basics", content:"Cyber security protects systems from hacking, malware, and data breaches."},
{title:"Cloud Computing", content:"Cloud platforms like AWS and Azure offer scalable computing resources."},
{title:"Big Data", content:"Big data technologies like Hadoop and Spark handle large datasets efficiently."},
{title:"Blockchain", content:"Blockchain is a decentralized system used in cryptocurrencies and secure transactions."},
{title:"Data Science", content:"Data science extracts insights using statistics and machine learning."},
{title:"AI in Healthcare", content:"AI helps in diagnosis, treatment planning, and patient care."},
{title:"Smart Cities", content:"Smart cities use IoT for better infrastructure and traffic management."},
{title:"AR/VR", content:"AR and VR create immersive digital experiences."},
{title:"Quantum Computing", content:"Quantum computing solves complex problems using qubits."},
{title:"Robotics", content:"Robotics automates industrial and daily tasks."},
{title:"Edge Computing", content:"Edge computing processes data near the source instead of cloud."},
{title:"DevOps", content:"DevOps improves software delivery speed and reliability."},
{title:"API Basics", content:"APIs enable communication between software applications."},
{title:"Web Development", content:"Web development uses HTML, CSS, JS to build websites."},
{title:"Mobile App Development", content:"Mobile apps are developed for Android and iOS platforms."}
];

function displayBlogs(data){
    const container = document.getElementById("blogList");
    container.innerHTML = "";

    data.forEach((blog,i)=>{
        container.innerHTML += `
        <div class="card" onclick="openBlog(${i})">
            <h3>${blog.title}</h3>
            <p>${blog.content.substring(0,90)}...</p>
        </div>`;
    });
}

function searchBlogs(){
    const value = document.getElementById("search").value.toLowerCase();
    const filtered = blogs.filter(b=>b.title.toLowerCase().includes(value));
    displayBlogs(filtered);
}

function openBlog(index){
    document.getElementById("blogList").style.display="none";
    document.getElementById("blogView").style.display="block";

    document.getElementById("blogTitle").innerText = blogs[index].title;
    document.getElementById("blogContent").innerText = blogs[index].content;
}

function goBack(){
    document.getElementById("blogView").style.display="none";
    document.getElementById("blogList").style.display="grid";
}

displayBlogs(blogs);

</script>

</body>
</html>
