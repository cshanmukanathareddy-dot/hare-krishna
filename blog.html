<h2>Edge AI Basics</h2>

<h3>Introduction</h3>
<p>Edge AI is an advanced computing approach where artificial intelligence models are deployed directly on local devices such as smartphones, IoT sensors, drones, cameras, and embedded systems. Unlike traditional AI systems that rely on cloud computing for processing, Edge AI performs computations locally, reducing latency and improving efficiency.</p>

<p>The rapid growth of connected devices and the need for real-time decision-making have made Edge AI a critical technology. It enables faster responses, enhances privacy, and reduces reliance on internet connectivity.</p>

<h3>Why Edge AI Matters</h3>
<p>Traditional AI systems send data to the cloud for processing. This creates delays and increases bandwidth usage. Edge AI solves these issues by processing data locally.</p>

<ul>
<li><b>Low Latency:</b> Instant decision-making</li>
<li><b>Privacy:</b> Data stays on device</li>
<li><b>Reduced Bandwidth:</b> Less cloud dependency</li>
<li><b>Offline Capability:</b> Works without internet</li>
</ul>

<h3>Core Components</h3>
<p>Edge AI consists of devices, AI models, frameworks, and sensors. These components work together to process data efficiently at the edge.</p>

<h3>Applications</h3>
<p>Edge AI is used in various industries:</p>
<ul>
<li>Autonomous vehicles for real-time navigation</li>
<li>Healthcare devices for monitoring patients</li>
<li>Smart cameras for surveillance</li>
<li>Industrial automation systems</li>
</ul>

<h3>Advantages</h3>
<p>Edge AI provides several advantages such as faster processing, enhanced security, and improved reliability. It reduces dependency on centralized systems and ensures uninterrupted operation.</p>

<h3>Challenges</h3>
<p>Despite its benefits, Edge AI faces challenges like limited computing power, energy constraints, and model optimization requirements.</p>

<h3>Future of Edge AI</h3>
<p>With advancements in AI chips and 5G technology, Edge AI is expected to grow rapidly. It will play a key role in smart cities, robotics, and augmented reality.</p>

<h3>Conclusion</h3>
<p>Edge AI is transforming industries by enabling intelligent decision-making at the source of data.</p>

<p>In the coming years, Edge AI will become a fundamental part of modern technology systems, enabling faster, smarter, and more secure applications.</p>

<p>Its integration with IoT, cloud computing, and big data will further enhance its capabilities and open new opportunities across industries.</p>

<p>Understanding Edge AI is essential for anyone interested in the future of artificial intelligence and technology innovation.</p>

/* SHOW PREVIEW ONLY */
function getPreview(html){
    let text = html.replace(/<[^>]+>/g, ""); // remove HTML tags
    return text.substring(0,120) + "...";
}

/* DISPLAY BLOGS */
function displayBlogs(data){
    let container = document.getElementById("blogList");
    container.innerHTML = "";

    data.forEach((blog,i)=>{
        container.innerHTML += `
        <div class="card">
            <h3>${blog.title}</h3>
            <p class="preview">${getPreview(blog.content)}</p>
            <div class="button" onclick="openBlog(${i})">Read More</div>
        </div>`;
    });
}

/* SEARCH */
function searchBlogs(){
    let val = document.getElementById("search").value.toLowerCase();
    let filtered = blogs.filter(b => b.title.toLowerCase().includes(val));
    displayBlogs(filtered);
}

/* OPEN FULL BLOG */
function openBlog(i){
    document.getElementById("blogList").style.display="none";
    document.getElementById("blogView").style.display="block";

    document.getElementById("title").innerText = blogs[i].title;
    document.getElementById("content").innerHTML = blogs[i].content;
}

/* BACK */
function goBack(){
    document.getElementById("blogView").style.display="none";
    document.getElementById("blogList").style.display="grid";
}

/* INIT */
displayBlogs(blogs);
