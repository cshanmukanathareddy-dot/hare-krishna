<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NovaTech Hub Blog</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
    margin: 0;
    background: linear-gradient(to right, #eef2ff, #f8fafc);
    color: #1e293b;
}

/* HEADER */
header {
    background: linear-gradient(135deg, #0f172a, #1e40af);
    color: white;
    text-align: center;
    padding: 20px;
}

/* SEARCH */
input {
    width: 60%;
    padding: 12px;
    margin: 20px auto;
    display: block;
    border-radius: 10px;
    border: 1px solid #cbd5e1;
}

/* GRID */
.cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
    gap: 20px;
    padding: 20px;
}

/* CARD */
.card {
    background: white;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    cursor: pointer;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-8px);
    background: #e0e7ff;
}

/* BLOG VIEW */
#blogView {
    display: none;
    padding: 30px;
    max-width: 800px;
    margin: auto;
}

button {
    padding: 10px 15px;
    border: none;
    background: #2563eb;
    color: white;
    border-radius: 6px;
    cursor: pointer;
}

button:hover {
    background: #1d4ed8;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 15px;
    background: #0f172a;
    color: #cbd5f5;
}
</style>
</head>

<body>

<header>
<h1>🚀 NovaTech Hub Blogs</h1>
</header>

<input type="text" id="search" placeholder="Search blogs..." onkeyup="searchBlogs()">

<div class="cards" id="blogList"></div>

<div id="blogView">
    <button onclick="goBack()">⬅ Back</button>
    <h2 id="blogTitle"></h2>
    <p id="blogContent"></p>
</div>

<footer>
<p>© 2026 NovaTech Hub</p>
</footer>

<script>

const blogs = [
{title:"Edge AI Basics", content:"Edge AI allows data processing directly on devices like smartphones and IoT systems without cloud dependency. It improves speed and privacy."},
{title:"IoT Architecture", content:"IoT includes sensors, network layer, and cloud. These layers help devices communicate and automate systems."},
{title:"Machine Learning Guide", content:"Machine learning enables systems to learn from data using algorithms like regression and classification."},
{title:"Deep Learning", content:"Deep learning uses neural networks to process complex patterns such as images and speech."},
{title:"5G Technology", content:"5G provides ultra-fast internet speeds, low latency, and supports smart cities and IoT."},
{title:"Cyber Security Basics", content:"Cyber security protects systems from hacking, malware, and unauthorized access."},
{title:"Cloud Computing", content:"Cloud platforms like AWS and Azure allow scalable storage and computing services."},
{title:"Big Data", content:"Big data involves processing large datasets using Hadoop and Spark technologies."},
{title:"Blockchain", content:"Blockchain is a decentralized ledger used in cryptocurrencies and secure transactions."},
{title:"Data Science", content:"Data science uses statistics and machine learning to extract insights from data."},
{title:"AI in Healthcare", content:"AI helps diagnose diseases, predict outcomes, and improve patient care."},
{title:"Smart Cities", content:"Smart cities use IoT to improve traffic, energy, and infrastructure."},
{title:"AR/VR", content:"Augmented and Virtual Reality create immersive digital experiences."},
{title:"Quantum Computing", content:"Quantum computing uses qubits to solve complex problems faster."},
{title:"Robotics", content:"Robots automate tasks in industries and daily life."},
{title:"Edge Computing", content:"Edge computing processes data closer to the source instead of cloud."},
{title:"DevOps", content:"DevOps combines development and operations for faster delivery."},
{title:"API Basics", content:"APIs allow communication between different software systems."},
{title:"Web Development", content:"Web development involves building websites using HTML, CSS, and JavaScript."},
{title:"Mobile App Development", content:"Mobile apps are built for Android and iOS platforms."}
];

function displayBlogs(data){
    const container = document.getElementById("blogList");
    container.innerHTML = "";
    data.forEach((blog,i)=>{
        container.innerHTML += `
        <div class="card" onclick="openBlog(${i})">
            <h3>${blog.title}</h3>
            <p>${blog.content.substring(0,80)}...</p>
        </div>`;
    });
}

function searchBlogs(){
    const value = document.getElementById("search").value.toLowerCase();
    const filtered = blogs.filter(b=>b.title.toLowerCase().includes(value));
    displayBlogs(filtered);
}

function openBlog(index){
    document.getElementById("blogList").style.display="none";
    document.getElementById("blogView").style.display="block";

    document.getElementById("blogTitle").innerText = blogs[index].title;
    document.getElementById("blogContent").innerText = blogs[index].content;
}

function goBack(){
    document.getElementById("blogView").style.display="none";
    document.getElementById("blogList").style.display="grid";
}

displayBlogs(blogs);

</script>

</body>
</html>
