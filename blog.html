/* SHOW PREVIEW ONLY */
function getPreview(html){
    let text = html.replace(/<[^>]+>/g, ""); // remove HTML tags
    return text.substring(0,120) + "...";
}

/* DISPLAY BLOGS */
function displayBlogs(data){
    let container = document.getElementById("blogList");
    container.innerHTML = "";

    data.forEach((blog,i)=>{
        container.innerHTML += `
        <div class="card">
            <h3>${blog.title}</h3>
            <p class="preview">${getPreview(blog.content)}</p>
            <div class="button" onclick="openBlog(${i})">Read More</div>
        </div>`;
    });
}

/* SEARCH */
function searchBlogs(){
    let val = document.getElementById("search").value.toLowerCase();
    let filtered = blogs.filter(b => b.title.toLowerCase().includes(val));
    displayBlogs(filtered);
}

/* OPEN FULL BLOG */
function openBlog(i){
    document.getElementById("blogList").style.display="none";
    document.getElementById("blogView").style.display="block";

    document.getElementById("title").innerText = blogs[i].title;
    document.getElementById("content").innerHTML = blogs[i].content;
}

/* BACK */
function goBack(){
    document.getElementById("blogView").style.display="none";
    document.getElementById("blogList").style.display="grid";
}

/* INIT */
displayBlogs(blogs);
